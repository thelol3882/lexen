<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lexen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,400..700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<header class="masthead">
    <div class="masthead-left">
        <h1 class="wordmark">Lexen</h1>
        <span class="progress-chip" id="progress-chip" aria-live="polite"></span>
    </div>
    <nav class="controls">
        <label class="control">
            <span class="control-label">Source</span>
            <select id="source-locale" disabled></select>
        </label>
        <label class="control">
            <span class="control-label">Target</span>
            <select id="target-locale"></select>
        </label>
        <label class="control control-search">
            <span class="control-label">Find</span>
            <input id="search" type="search" placeholder="key or text fragment…">
        </label>
        <label class="control control-toggle" title="Show only entries that are still untranslated for the target locale">
            <input id="missing-only" type="checkbox">
            <span class="control-label">Untranslated only</span>
        </label>
        <label class="control control-toggle" title="Reveal key paths and source-file references — useful when pairing with a developer">
            <input id="show-context" type="checkbox">
            <span class="control-label">Source context</span>
        </label>
        <button id="theme-toggle" type="button" class="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
            <span class="theme-glyph"></span>
        </button>
    </nav>
</header>

<div class="frame">
    <aside class="rail">
        <ol class="namespaces" id="namespaces"></ol>
    </aside>
    <main class="entries" id="rows"></main>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script type="module" src="/app.js"></script>
</body>
</html>
